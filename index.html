<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIKA TCG | Official Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --pika-gold: #FFCB05; }
        body { 
            background: #000; color: #fff; font-family: 'Outfit', sans-serif; 
            margin: 0; min-height: 100vh; overflow-y: auto;
        }
        
        .bg-glow {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #221d00 0%, #000 100%);
        }

        .header { position: absolute; top: 25px; right: 25px; z-index: 100; }
        .btn-connect {
            background: rgba(255, 203, 5, 0.1); border: 1.5px solid var(--pika-gold);
            color: var(--pika-gold); font-weight: 900; padding: 12px 24px;
            border-radius: 8px; font-size: 11px; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        .main-stage { padding-top: 80px; padding-bottom: 80px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .pack-anchor { 
            width: 250px; height: 360px; position: relative; 
            cursor: pointer; z-index: 50; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .pack-visual { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 15px rgba(255, 203, 5, 0.3)); z-index: 60; }

        .reveal-card {
            width: 230px; 
            height: 320px; 
            background-image: url('https://i.ibb.co.com/236TgN9p/20260324-110430.jpg');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 14px; border: 3px solid #fff;
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5); 
            opacity: 0; 
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
            z-index: 70; 
            pointer-events: none;
        }

        .gtd-notice {
            max-width: 500px; text-align: center; background: rgba(255, 203, 5, 0.05);
            border: 1px solid rgba(255, 203, 5, 0.2); padding: 15px; border-radius: 10px;
            margin-bottom: 30px; margin-top: 10px;
        }

        .footer-nav { display: flex; gap: 15px; margin-top: 20px; }
        .btn-luxury {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; font-weight: 800; padding: 12px 25px; border-radius: 10px;
            font-size: 11px; text-transform: uppercase; transition: 0.3s;
        }

        #launch-msg {
            display: none; position: fixed; top: 85px; right: 25px;
            background: #000; border: 1px solid var(--pika-gold);
            padding: 15px; border-radius: 8px; z-index: 200; font-size: 11px;
            max-width: 300px; text-align: center; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="header">
        <button class="btn-connect" onclick="showPopup()">Connect Wallet</button>
        <div id="launch-msg"></div>
    </div>

    <div class="main-stage">
        <h1 style="font-family: 'Syncopate';" class="text-[9px] tracking-[10px] text-gray-500 mb-12 uppercase text-center">Pika TCG Terminal</h1>

        <div class="pack-anchor" id="packBox" onclick="startOpening()">
            <img src="https://i.ibb.co.com/9mmdpxkV/Adobe-Express-file-11.png" class="pack-visual" id="pikaPack">
            <div id="pikaCard" class="reveal-card"></div>
        </div>

        <div class="gtd-notice">
            <p class="text-[11px] leading-relaxed text-gray-300">
                <strong class="text-yellow-500 uppercase tracking-widest">GTD Eligibility Update:</strong><br>
                All wallet addresses will be added to OpenSea before <span class="text-white">March 27, 10:00 UTC</span>. 
                After that, users can check their wallet addresses to verify their eligibility.
            </p>
        </div>

        <div class="footer-nav">
            <a href="https://x.com/intent/follow?screen_name=thepikachuverse" target="_blank" class="btn-luxury">Follow on X</a>
            <a href="https://opensea.io/collection/pika-tcg-pack/overview" target="_blank" class="btn-luxury" style="border-color: #2081E2;">Mint on OpenSea</a>
        </div>

        <p class="mt-10 text-[7px] text-gray-700 tracking-[8px] uppercase">thepikaverse.art // encrypted</p>
    </div>

    <audio id="ripSound" src="https://www.soundjay.com/misc/sounds/paper-rip-1.mp3" preload="auto"></audio>
    <audio id="revealSound" src="https://www.soundjay.com/magic/magic-chime-01.mp3" preload="auto"></audio>

    <script>
        let isRevealed = false;

        function startOpening() {
            if(isRevealed) return;
            isRevealed = true;
            document.getElementById('ripSound').play();
            const tl = gsap.timeline();
            tl.to("#packBox", { duration: 0.05, x: 5, repeat: 10, yoyo: true });
            tl.to("#pikaPack", { duration: 0.5, scale: 1.4, opacity: 0, filter: "brightness(3) blur(10px)", ease: "power2.in" });
            tl.to("#pikaCard", {
                duration: 1.2, opacity: 1, scale: 1, y: 0, ease: "back.out(1.4)",
                boxShadow: "0 0 80px rgba(255, 203, 5, 0.4)",
                onStart: () => { document.getElementById('revealSound').play(); }
            }, "-=0.2");
        }

        function showPopup() {
            const msg = document.getElementById('launch-msg');
            msg.innerText = "On MARCH 28, 16:00 UTC, users can connect their wallets to open their TCG packs.";
            msg.style.display = 'block';
            gsap.fromTo(msg, { x: 30, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 });
            setTimeout(() => { 
                gsap.to(msg, { opacity: 0, duration: 0.4, onComplete: () => msg.style.display = 'none' });
            }, 5000);
        }
    </script>
</body>
</html>
