<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>opensea.io/collection</title>
    <style>
        body {
            background-color: #202124;
            color: #bdc1c6;
            font-family: "Segoe UI", Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none; /* টেক্সট কপি করা বন্ধ */
        }
        .container {
            max-width: 400px;
            text-align: left;
            padding: 20px;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            filter: grayscale(1);
        }
        h1 {
            font-size: 1.3em;
            font-weight: 400;
            color: #e8eaed;
            margin-bottom: 10px;
        }
        p {
            font-size: 0.9em;
            line-height: 1.5;
            margin: 5px 0;
        }
        .error-code {
            text-transform: uppercase;
            font-size: 0.75em;
            margin-top: 15px;
            color: #9aa0a6;
        }
        ul {
            padding-left: 20px;
            font-size: 0.9em;
        }
        li {
            margin-bottom: 5px;
        }
        .blue-text {
            color: #8ab4f8;
            text-transform: uppercase;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 10px;
            display: block;
            text-decoration: none;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="container">
        <div class="icon">🦖</div>
        
        <h1>Tap the dino or press space to play</h1>
        
        <p>Try:</p>
        <ul>
            <li>Turning off aeroplane mode</li>
            <li>Turning on mobile data or Wi-Fi</li>
            <li>Checking the signal in your area</li>
        </ul>

        <div class="error-code">ERR_INTERNET_DISCONNECTED</div>
        <a href="#" class="blue-text" onclick="return false;">⬇ Load page later</a>
    </div>

    <script>
        // Inspect Element এবং শর্টকাট কী বন্ধ করার কোড
        document.onkeydown = function(e) {
            if(event.keyCode == 123) { // F12 বন্ধ
                return false;
            }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I বন্ধ
                return false;
            }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C বন্ধ
                return false;
            }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J বন্ধ
                return false;
            }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U (View Source) বন্ধ
                return false;
            }
        }
    </script>
</body>
</html>
