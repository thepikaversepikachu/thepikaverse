<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pika Verse | Golden Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --pika-yellow: #FFCB05; --golden-glow: #FFD700; --pika-blue: #2A75BB; }
        
        body { 
            background: #000; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
            margin: 0;
        }

        .cartoon-font { font-family: 'Bangers', cursive; letter-spacing: 2px; }

        /* --- NEW GOLDEN LIGHTING BACKGROUND --- */
        .golden-bg {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(circle at center, #4b3b00 0%, #000 100%);
        }
        
        /* Electric Sparks/Lightning Effect */
        .golden-sparks {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            animation: pulse-glow 3s infinite alternate;
        }

        /* Lighting Ray Effect */
        .light-ray {
            position: absolute; top: 50%; left: 50%;
            width: 150vw; height: 150vh;
            background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.1), transparent 40deg);
            transform: translate(-50%, -50%);
            animation: rotate-ray 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate-ray { to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes pulse-glow { from { opacity: 0.2; } to { opacity: 0.5; } }

        /* Pokemon Decoration */
        .pkmn-decor {
            position: fixed; z-index: -1; pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Comic Card with Golden Border */
        .comic-card {
            background: white;
            border: 8px solid #000;
            border-radius: 40px;
            box-shadow: 15px 15px 0px #000, 0 0 50px rgba(255, 215, 0, 0.3);
            color: #333;
            position: relative;
            transform: rotate(-1deg);
        }

        .text-stroke {
            color: var(--pika-yellow);
            -webkit-text-stroke: 2px #000;
            text-shadow: 5px 5px 0px #000;
        }
        
        .status-badge {
            background: #FF1F1F;
            color: white;
            padding: 5px 20px;
            border: 4px solid #000;
            display: inline-block;
            transform: rotate(5deg);
            box-shadow: 5px 5px 0px #000;
        }

        .btn-thunder {
            background: var(--pika-yellow);
            border: 4px solid #000;
            color: #000;
            font-size: 1.5rem;
            padding: 15px 40px;
            border-radius: 20px;
            box-shadow: 8px 8px 0px #000;
            transition: 0.2s;
        }
        .btn-thunder:hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 4px 4px 0px #000;
            background: #fff;
        }

        .charmander { bottom: 20px; left: 50px; width: 140px; }
        .squirtle { bottom: 20px; right: 50px; width: 140px; transform: scaleX(-1); }
        .pika-main { top: -80px; left: 50%; transform: translateX(-50%); width: 180px; z-index: 10; }

    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="golden-bg"></div>
    <div class="light-ray"></div>
    <div class="golden-sparks"></div>

    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/004.png" class="pkmn-decor charmander hidden md:block" alt="Charmander">
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/007.png" class="pkmn-decor squirtle hidden md:block" alt="Squirtle">

    <div class="max-w-2xl w-full mt-20">
        <div class="comic-card p-8 md:p-12 text-center">
            
            <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png" class="absolute pika-main drop-shadow-2xl" alt="Pikachu">

            <div class="mt-12">
                <div class="status-badge cartoon-font text-xl mb-6">ATTENTION HUNTERS!</div>
                
                <h1 class="cartoon-font text-5xl md:text-7xl text-stroke mb-4 uppercase">WL FCFS<br>IS CLOSED!</h1>
                
                <div class="space-y-4 px-4 mt-6">
                    <p class="text-xl font-black uppercase italic tracking-tight text-yellow-600">
                        The Thunder Has Settled! ⚡
                    </p>
                    <p class="text-gray-700 font-bold leading-tight">
                        All FCFS slots have been claimed. But stay alert, a new energy is rising!
                    </p>
                    
                    <div class="bg-yellow-50 border-4 border-dashed border-yellow-500 p-4 rounded-2xl">
                        <p class="cartoon-font text-2xl text-red-600">GTD ACCESS IS COMING SOON!</p>
                        <p class="text-xs font-bold text-gray-400 uppercase">Be ready for the Guaranteed Phase!</p>
                    </div>
                </div>

                <div class="mt-10">
                    <a href="https://x.com/thepikachuverse" target="_blank" class="btn-thunder cartoon-font inline-block">
                        FOLLOW @THEPIKACHUVERSE ⚡
                    </a>
                </div>
            </div>

            <div class="absolute -top-5 -left-5 bg-blue-500 text-white p-2 border-4 border-black rounded-full font-black text-xs">999 SUPPLY</div>
            <div class="absolute -bottom-5 -right-5 bg-yellow-400 text-black p-2 border-4 border-black rounded-lg font-black text-xs italic">MINT 18.03.2026</div>
        </div>
        
        <p class="text-center mt-12 cartoon-font text-yellow-500 opacity-60 text-sm tracking-widest">© THE PIKA VERSE PROTOCOL</p>
    </div>

</body>
</html>
